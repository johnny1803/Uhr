<head>
  <meta charset="UTF-8">

  <title>🎵 Liedtext-Viewer (HTML)</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #1e1e1e;
      font-family: 'Arial', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 10px;
    }

    .app {
      background-color: #1e1e1e;
      color: white;
      width: 100%;
      max-width: 1000px;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      padding: 15px 10px 5px;
      font-weight: bold;
      color: white;
      background-color: #1e1e1e;
      margin: 0;
    }

    .song-list {
      background-color: #2b2b2b;
      margin: 10px 10px 5px;
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #444;
    }

    .song-list ul {
      list-style: none;
      padding: 5px 0;
    }

    .song-list li {
      padding: 10px 15px;
      font-size: 1.2rem;
      color: white;
      cursor: pointer;
      border-bottom: 1px solid #3a3a3a;
      transition: background 0.2s;
    }

    .song-list li:last-child {
      border-bottom: none;
    }

    .song-list li:hover {
      background-color: #3a3a3a;
    }

    .song-list li.selected {
      background-color: #444444;
      font-weight: bold;
    }

    button {
      background-color: #3a3a3a;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 1.3rem;
      border-radius: 40px;
      cursor: pointer;
      margin: 10px 10px 5px;
      font-weight: bold;
      transition: background 0.2s;
      border: 1px solid #555;
    }

    button:hover {
      background-color: #505050;
    }

    .text-display {
      background-color: #121212;
      color: #f0f0f0;
      font-family: 'Arial', monospace;
      font-size: 1.2rem;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      flex: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      border: 1px solid #333;
      line-height: 1.5;
    }

    /* Präsentationsmodus (Modal) */
    .presentation-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      color: white;
      display: none;  /* versteckt zu Beginn */
      justify-content: center;
      align-items: center;
      z-index: 1000;
      flex-direction: column;
    }

    .presentation-content {
      width: 90%;
      max-width: 1100px;
      height: 90%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Text etwas kleiner als vorher, damit er immer auf den Bildschirm passt */
    .strophe-text {
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-weight: bold;
      color: white;
      text-align: center;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.4;
      margin-bottom: 30px;
      width: 100%;
      max-height: 70vh;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .nav-buttons button {
      background-color: #333;
      color: white;
      border: 1px solid #666;
      font-size: 1.3rem;
      padding: 12px 25px;
      border-radius: 50px;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.2s, background 0.2s;
      min-width: 130px;
    }

    .nav-buttons button:hover {
      opacity: 1;
      background-color: #444;
    }

    /* Spezieller Schließen-Button (etlich hervorgehoben) */
    #closePresentationBtn {
      background-color: #5a2e2e;
      border-color: #a55;
    }

    #closePresentationBtn:hover {
      background-color: #7a3e3e;
    }

    /* Hinweis für kleine Bildschirme */
    @media (max-width: 600px) {
      h1 { font-size: 1.5rem; }
      .song-list li { font-size: 1rem; }
      button { font-size: 1.1rem; padding: 10px; }
      .text-display { font-size: 1rem; padding: 15px; }
      .nav-buttons button { font-size: 1.1rem; padding: 10px 15px; min-width: 100px; }
      .strophe-text { font-size: clamp(1.2rem, 6vw, 2.5rem); }
    }
  </style>
</head>

Niemand, kein Mensch
kann uns soviel geben wie du
du führst uns zum Leben zurück
nur du
nur du schenkst uns Lebensglück

    "Herz und Herz vereint zusammen": `Herz und Herz vereint zusammen
sucht in Gottes Herzen Ruh'!
Lasset eure Liebesflammen lodern
auf den Heiland zu!
Er das Haupt, wir Seine Glieder,
Er das Licht und wir der Schein;
Er der Meister, wir die Brüder,
Er ist unser, wir sind Sein.

Kommt, ach kommt, ihr Gnadenkinder,
und erneuert euren Bund,
schwöret unserm Überwinder
Lieb und Treu aus Herzensgrund!
Und wenn eurer Liebeskette
Festigkeit und Stärke fehlt,
o so flehet um die Wette,
bis sie Jesus wieder stählt!

Legt es unter euch, ihr Glieder,
auf so treues Lieben an,
daß ein jeder für die Brüder
auch das Leben lassen kann.
So hat uns der Freund geliebet,
so vergoß Er dort sein Blut;
denkt doch, wie es Ihn betrübet,
wenn ihr euch selbst Eintrag tut.

Halleluja, welche Höhen,
welche Tiefen reicher Gnad,
daß wir dem ins Herze sehen,
der uns so geliebet hat;
daß der Vater aller Geister,
der der Wunder Abgrund ist,
daß Du, unsichtbarer Meister,
uns so fühlbar nahe bist.

Ach Du holder Freund, vereine
Deine Dir geweihte Schar,
daß sie es so herzlich meine,
wie's Dein letzter Wille war.
Ja verbinde in der Wahrheit,
die Du selbst im Wesen bist,
alles, was von Deiner Klarheit
in der Tat erleuchtet ist.

Liebe, hast Du es geboten,
daß man Liebe üben soll.
O so mache doch die toten,
trägen Geister lebensvoll:
Zünde an die Liebesflammen,
daß ein jeder sehen kann:
Wir als die von einem Stamme
stehen auch für einen Mann.

Laß uns so vereinigt werden,
wie Du mit dem Vater bist,
bis schon hier auf dieser Erde
kein getrenntes Glied mehr ist.
Und allein von Deinem Brennen
nehme unser Licht den Schein;
also wird die Welt erkennen,
daß wir Deine Jünger seien.`,

Jesus du stehst hoch über allem.

    "Hört der Engel helle Lieder": `Hört, der Engel helle Lieder
klingen das weite Feld entlang,
und die Berge hallen wider

Gloria in excelsis Deo.

Gloria in excelsis Deo.

Sie verkünden uns mit Schalle,
dass der Erlöser nun erschien,
dankbar singen sie heut alle

Gloria in excelsis Deo.`,

    "Ich hab noch nie eine Liebe wie die deine gefunden": `Ich hab gewartet und gewacht
Wann kommt der Morgen, geht die Nacht
Ich will dich sehen, ich will dich sehen

Ich fliehe alles was mich hält

Nichts kann mich trösten wie ein Blick von dir

Ich warte auf den Morgenstern

mein ganzes Leben lang.

    "Ich seh den König kommen Hosanna": `Ich seh den König kommen

    "Ich singe dir mit Herz und Mund": `Ich singe dir mit Herz und Mund,
Herr, meines Herzens Lust;
ich sing und mach auf Erden kund,
was mir von dir bewusst.

Ich weiß, dass du der Brunn der Gnad
und ewge Quelle bist,
daraus uns allen früh und spat
viel Heil und Gutes fließt.

Was sind wir doch? Was haben wir
auf dieser ganzen Erd,
das uns, o Vater, nicht von dir
allein gegeben werd?

Du füllst des Lebens Mangel aus
mit dem, was ewig steht,
und führst uns in des Himmels Haus,
wenn uns die Erd entgeht.

Wohlauf, mein Herze, sing und spring
und habe guten Mut!
Dein Gott, der Ursprung aller Ding,
ist selbst und bleibt dein Gut.

Er hat noch niemals was versehn
in seinem Regiment,
nein, was er tut und lässt geschehn,
das nimmt ein gutes End.

Ei nun, so lass ihn ferner tun
und red ihm nicht darein,
so wirst du hier im Frieden ruhn
und ewig fröhlich sein.`,

    "Ich steh an deiner Krippen hierBeside the manger here I stand": `Ich steh an deiner Krippen hier,
o Jesu, du mein Leben;
ich komme, bring und schenke dir,
was du mir hast gegeben.
Nimm hin, es ist mein Geist und Sinn,
Herz, Seel und Mut, nimm alles hin
und lass dir's wohlgefallen.

Da ich noch nicht geboren war,
da bist du mir geboren
und hast mich dir zu eigen gar,
eh ich dich kannt, erkoren.
Eh ich durch deine Hand gemacht,
da hast du schon bei dir bedacht,
wie du mein wolltest werden.

Ich lag in tiefster Todesnacht,
du warest meine Sonne,
die Sonne, die mir zugebracht
Licht, Leben, Freud und Wonne.
O Sonne, die das werte Licht
des Glaubens in mir zugericht',
wie schön sind deine Strahlen!

Ich sehe dich mit Freuden an
und kann mich nicht satt sehen;
und weil ich nun nichts weiter kann,
bleib ich anbetend stehen.
O dass mein Sinn ein Abgrund wär
und meine Seel ein weites Meer,
dass ich dich möchte fassen!

Wann oft mein Herz im Leibe weint
und keinen Trost kann finden,
rufst du mir zu: "Ich bin dein Freund,
ein Tilger deiner Sünden.
Was trauerst du, o Bruder mein?
Du sollst ja guter Dinge sein,
ich zahle deine Schulden."

O dass doch so ein lieber Stern
soll in der Krippen liegen!
Für edle Kinder großer Herrn
gehören güldne Wiegen.
Ach Heu und Stroh ist viel zu schlecht,
Samt, Seide, Purpur wären recht,
dies Kindlein drauf zu legen!

Nehmt weg das Stroh, nehmt weg das Heu,
ich will mir Blumen holen,
dass meines Heilands Lager sei
auf lieblichen Violen;
mit Rosen, Nelken, Rosmarin
aus schönen Gärten will ich ihn
von oben her bestreuen.

Du fragest nicht nach Lust der Welt
noch nach des Leibes Freuden;
du hast dich bei uns eingestellt,
an unsrer Statt zu leiden,
suchst meiner Seele Herrlichkeit
durch Elend und Armseligkeit;
das will ich dir nicht wehren.

Eins aber, hoff ich, wirst du mir,
mein Heiland, nicht versagen:
daß ich dich möge für und für
in, bei und an mir tragen.
O lass mich doch dein Kripplein sein;
komm, komm und lege bei mir ein
dich und all deine Freuden.


Beside thy manger here I stand
Dear Jesus, Lord and Savior
A gift of love within my hand
To thank Thee for Thy favor
O take my humble offering
my heart, my soul, yes, everything
Is Thine to keep forever.

With joy I gaze upon Thy face;
Thy glory and Thy splendor
Is greater than my heart can praise
And songs can fitly render.
O how I wish my mind would be
As boundless as the deepest sea,
T'would still be lost in wonder.

O grant me this abundant grace -
I hope t'will meet Thy pleasure -
That I might be Thy dwelling place,
Dear Savior Sweetest Treasure.
O Let me be Thy manger-bed
Then shall I lift my lowly head
With joy beyond all measure.`,

    "Ich weiß dass mein Erlöser lebt": `Komm, komm, du Sohn des Höchsten.
Komm herab, zerreiß die Finsternis!

Komm, mein treuer Freund, verlass mich nicht!

Ich weiß, dass mein Erlöser lebt!

Hoch über all dem Staub der Welt.
Ich weiß, dass mein Erlöser lebt!

Heilig! Dein Haus ist heilig!
Und aus Staub und Schmerz erhebst Du mich!
Ewig! Der Weg ist ewig!
Ich weiß, ich werde leben, weil Du bist!

Ich weiß, dass mein Erlöser lebt!

Ich werd's mit meinen Augen sehen!

Du Sohn des Höchsten!

Komm, komm! O komm, komm!`,

    "Ich will singen dem Herrn mein Leben lang": `Ich will singen dem Herrn mein Leben lang,

    "Ihr Kinderlein kommet": `Ihr Kinderlein, kommet, o kommet doch all!
Zur Krippe her kommet in Bethlehems Stall,
und seht, was in dieser hochheiligen Nacht
der Vater im Himmel für Freude uns macht.

O seht in der Krippe, im nächtlichen Stall,

viel schöner und holder, als Engel es sind!

Da liegt es, ihr Kinder, auf Heu und auf Stroh,
Maria und Joseph betrachten es froh;
die redlichen Hirten knien betend davor,
hoch oben schwebt jubelnd der Engelein Chor

O beugt, wie die Hirten, anbetend die Knie;
erhebet die Hände und danket wie sie!
Stimmt freudig, ihr Kinder, wer sollt' sich nicht freu'n?
Stimmt freudig zum Jubel der Engel mit ein`,

    "Immer mehr von dir": `Immer mehr von dir, immer mehr!
Immer mehr sein wie du, immer mehr!
Immer mehr deine Worte verstehn,
deine Werke tun,
o Herr, immer mehr!

Du bist ein Gott, der seine Kinder Liebt,
der als ein Vater ihr Verlangen sieht.
Niemand und nichts kommt dir jemahls gleich, o Herr.
Du zeigst dich uns als ewig, treuer Freund
und weißt genau wie unser Herz es meint.
Gib uns mehr von dir, immer mehr!`,

    "In Christus ist mein ganzer HaltIn Christ alone my hope is found": `In Christus ist mein ganzer Halt.
Er ist mein Licht, mein Heil, mein Lied.
Der Eckstein und der feste Grund, sicherer Halt in Sturm und Wind.
Wer liebt wie er, stillt meine Angst, bringt Frieden mir mitten im Kampf?
Mein Trost ist er in allem Leid.
In seiner Liebe find‘ ich Halt.

Das ew’ge Wort, als Mensch gebor’n. Gott offenbart in einem Kind.
Der Herr der Welt, verlacht, verhöhnt und von den Seinen abgelehnt.
Doch dort am Kreuz, wo Jesus starb und Gottes Zorn ein Ende fand,
trug er die Schuld der ganzen Welt. Durch seine Wunden bin ich heil.

Sie legten ihn ins kühle Grab. Dunkel umfing das Licht der Welt.
Doch morgens früh am dritten Tag wurde die Nacht vom Licht erhellt.
Der Tod besiegt, das Grab ist leer, der Fluch der Sünde ist nicht mehr,
denn ich bin sein, und er ist mein. Mit seinem Blut macht er mich rein.

Nun hat der Tod die Macht verlor’n. Ich bin durch Christus neu gebor’n.
Mein Leben liegt in seiner Hand vom ersten Atemzuge an.
Und keine Macht in dieser Welt kann mich ihm rauben, der mich hält,
bis an das Ende dieser Zeit, wenn er erscheint in Herrlichkeit.


In Christ alone my hope is found,
He is my light, my strength, my song
This Cornerstone, this solid ground
Firm through the fiercest drought and storm

What heights of love, what depths of peace

This gift of love and righteousness

The wrath of God was satisfied
For every sin on Him was laid
Here in the death of Christ I live

There in the ground His body lay

Then bursting forth in glorious Day
Up from the grave He rose again

And as He stands in victory
Sin's curse has lost its grip on me
For I am His and He is mine
Bought with the precious blood of Christ

No guilt in life, no fear in death
This is the power of Christ in me
From life's first cry to final breath
Jesus commands my destiny

No power of hell, no scheme of man
Can ever pluck me from His hand
Till He returns or calls me home
Here in the power of Christ I'll stand`,

    "Jeden Morgen neu (a mothers prayer)": `Noch bevor ich dich kannte, warst du wunderschön gemacht
Jedes Detail von dir hat Gott sich ausgedacht.

Jeden Morgen neu, leg ich dich in seine Hand.

Jeden Morgen neu, leg ich dich in seine Hand. Bete das dein Herz von ihm erfüllt wird, dass du nach seinem Plan lebst.

Ob es jetzt gleich kracht und blitzt,
ob gleich Sünd und Hölle schrecken,
Jesus will mich decken.

Trotz dem alten Drachen,
trotz dem Todesrachen,
trotz der Furcht dazu!
Tobe, Welt, und springe;
ich steh hier und singe
in gar sichrer Ruh.
Gottes Macht hält mich in acht;
Erd' und Abgrund muss verstummen,
ob sie noch so brummen.

Weg mit allen Schätzen!
Du bist mein Ergötzen,
Jesu, meine Lust.
Weg, ihr eitlen Ehren,
ich mag euch nicht hören,
bleibt mir unbewusst!
Elend, Not, Kreuz,
Schmach und Tod
soll mich, ob ich viel muss leiden,
nicht von Jesu scheiden.

Gute Nacht, o Wesen,
das die Welt erlesen, mir gefällst du nicht!
Gute Nacht, ihr Sünden,
bleibet weit dahinten,
kommt nicht mehr ans Licht!
Gute Nacht, du Stolz und Pracht;
dir sei ganz, du Lasterleben,
gute Nacht gegeben!

Weicht, ihr Trauergeister!
denn mein Freudenmeister,
Jesus, tritt herein.
Denen, die Gott lieben,
muss auch ihr Betrüben
lauter Freude sein.
Duld ich schon hier Spott und Hohn,
dennoch bleibst du auch im Leide,
Jesu, meine Freude.`,

    "Jesus höchster Name": `Jesus, höchster Name,
Teurer Erlöser, siegreicher Herr.
Immanuel, Gott ist mit uns
Herrlicher Heiland, lebendiges Wort.

Er ist der Friedefürst und der allmächtge Gott,
Ratgeber wunderbar, ewiger Vater.
Und die Herrschaft ruht auf seinen Schultern
Und seines Friedensreichs wird kein Ende sein,`,

    "Jesus in meinem HausJesus in my House": `Danke, Vater, für das Leben, das du gibst,
dass du deinen Sohn gabst und mich unbegreiflich liebst.
Hast mich gerettet und mich neu gemacht.
Danke Gott, für Jesus in mir.

Ich bin froh mit Jesus in meinem Haus.
Gut zu wissen: jederzeit ist er hier.
Mein Leben lang, Jesus in mir in meinem Haus,
für allezeit und in Ewigkeit.

Danke, dass du meinem Leben Zukunft gibst.
Ich darf neu beginnen, weil du meine Schuld vergibst.
Ich gehe vorwärts, denn ich weiß bestimmt:
Jesus ist bei mir jeden Tag.

Ich bin froh mit Jesus in meinem Haus.
Gut zu wissen: jederzeit ist er hier.
Mein Leben lang, Jesus in mir in meinem Haus,
für allezeit und in Ewigkeit.


Thank you heavenly Father for your love for me
I'm forever grateful that you sacrificed your son
You saved my soul and changed my destiny
Thank you God for Jesus in me

I'm so glad that Jesus lives in my house
Good to know that he is here with me now
All of my life Jesus in me
Jesus in my house
All on my life and always will be

Thank you for the purpose you have place in me
Thank you for forgiveness and the chance to start again
I face the future kowing I will be
Safe and sound with Jesus in me

I'm so glad that Jesus lives in my house
Good to know that he is here with me now
All of my life Jesus in me
Jesus in my house
All on my life and always will be`,

    "Jesus meine Hoffnung lebtLiving Hope": `Zu tief der Abgrund, der uns einst trennte,
zu hoch der Gipfel, der vor mir lag.
Voller Verzweiflung sah ich zum Himmel,
sprach deinen Namen in die Nacht.
Und in das Dunkel kam deine Güte,
zerriss die Schatten tief in mir.
Die Nacht bezwungen, der Sieg errungen:
Jesus, meine Hoffnung, lebt.

So unvorstellbar ist deine Gnade,
so unbegreiflich ist deine Gunst.
Der Herr der Zeiten verließ den Himmel,
nahm auf sich meine Scham und Schuld.
Das Kreuz bezeugt es: mir ist vergeben.
Der König selbst nennt mich sein Kind.
Er ist mein Retter und ich gehör ihm.
Jesus, meine Hoffnung, lebt.

Halleluja, preist den, der mir Freiheit gab.
Halleluja, er besiegte Tod und Grab.
Alle Ketten sind gesprengt
von dem Gott, der Rettung bringt.
Jesus, meine Hoffnung, lebt.

Dann kam der Morgen so wie verheißen:
dein toter Körper ist neu erwacht.
Mit lauter Stimme hast du verkündet:
kein Grab hat nun Anspruch mehr auf mich.
Jesus, dein Sieg bleibt ewiglich.
Schluss
Jesus, meine Hoffnung, lebt.


How great the chasm that lay between us
How high the mountain I could not climb
In desperation, I turned to heaven
And spoke Your name into the night
Then through the darkness, Your loving-kindness
Tore through the shadows of my soul
The work is ﬁnished, the end is written
Jesus Christ, my living hope

Who could imagine so great a mercy?
What heart could fathom such boundless grace?
The God of ages stepped down from glory
To wear my sin and bear my shame
The cross has spoken, I am forgiven
The King of kings calls me His own
Beautiful Savior, I'm Yours forever
Jesus Christ, my living hope

Hallelujah, praise the One who set me free
Hallelujah, death has lost its grip on me
You have broken every chain
There's salvation in Your name
Jesus Christ, my living hope

Then came the morning that sealed the promise
Your buried body began to breathe
Out of the silence, the Roaring Lion
Declared the grave has no claim on me
Then came the morning that sealed the promise
Your buried body began to breathe
Out of the silence, the Roaring Lion
Declared the grave has no claim on me
Jesus, Yours is the victory, whoa!

Hallelujah, praise the One who set me free
Hallelujah, death has lost its grip on me
You have broken every chain
There's salvation in Your name
Jesus Christ, my living hope

Jesus Christ, my living hope
Oh God, You are my living hope`,

    "Jesus wir sehen auf dich": `Jesus, wir sehen auf dich.
Deine Liebe, die will uns verändern,
und in uns spiegelt sich deine Herrlichkeit.
Jesus, wir sehen auf dich.

Jesus, wir hören auf dich.
Du hast Worte des ewigen Lebens,
und wir haben erkannt, du bist Christus.
Jesus, wir hören auf dich.

Jesus, wir warten auf dich.
Du wirst kommen nach deiner Verheißung.
Alle Menschen sie werden Dich sehen.
Jesus, wir warten auf dich.`,

    "Jesus zu dir kann ich so kommen wie ich bin": `Jesus, zu dir kann ich so kommen, wie ich bin.
Du hast gesagt, dass jeder kommen darf.
Ich muss dir nicht erst beweisen, dass ich besser werden kann.
Was mich besser macht vor dir, das hast du längst am Kreuz getan.
Und weil du mein Zögern siehst, streckst du mir deine Hände hin,
und ich kann so zu dir kommen, wie ich bin.

Jesus, bei dir darf ich mich geben, wie ich bin.
Ich muss nicht mehr als ehrlich sein vor dir.
Ich muss nichts vor dir verbergen, der mich schon so lange kennt.
Du siehst, was mich zu dir zieht, und auch, was mich von dir noch trennt.
Und so leg ich Licht und Schatten meines Lebens vor dich hin,
denn bei dir darf ich mich geben, wie ich bin.

Jesus, bei dir muss ich nicht bleiben, wie ich bin.
Nimm fort, was mich und andere zerstört.
Einen Menschen willst du aus mir machen,
wie er dir gefällt, der ein Brief von deiner Hand ist, voller Liebe für die Welt.
Du hast schon seit langer Zeit mit mir das Beste nur im Sinn.
Darum muss ich nicht so bleiben, wie ich bin.`,

    "Keiner ist wie du": `Keiner ist wie du!
Niemand sonst berührt mein Herz so wie du.
Wo auch immer ich noch suchte, o Herr,
es bleibt:
Keiner ist wie du!

Erbarmen fließt wie ein weiter Strom,
und Heilung strömt aus deiner Hand.
Kinder mit Wunden
sind sicher bei dir.
Keiner ist wie du!`,

    "Komm jetzt ist die Zeit wir beten anCome now is the time to worship": `Komm, jetzt ist die Zeit, wir beten an.
Komm, jetzt ist die Zeit, gib Ihm dein Herz.
Komm, so wie du bist und bete an.
Komm, so wie du bist vor Deinen Gott.
Komm.

Jede Zunge wird Dich bekennen als Gott.
Jeder wird sich beugen vor Dir.
Doch der größte Schatz bleibt für die bestehn,
die jetzt schon mit Dir gehn.


Come, now is the time to worship
Come, now is the time to give your heart
Come, just as you are to worship
Come, just as you are before your God

One day ev'ry tongue will confess You are God
One day ev'ry knee will bow
Still the greatest treasure remains for those
Who gladly choose you now`,

    "Komm sag es allen weiter": `Komm, sag' es allen weiter,
ruf es in jedes Haus hinein!
Komm, sag es allen weiter:
Gott selber lädt uns ein.

Wir haben sein Versprechen:
Er nimmt sich für uns Zeit,
wird selbst das Brot uns brechen,
kommt, alles ist bereit.

Komm, sag' es allen weiter,
ruf es in jedes Haus hinein!
Komm, sag es allen weiter:
Gott selber lädt uns ein.

Sein Haus hat offne Türen,
er ruft uns in Geduld,
will alle zu sich führen,
auch die mit Not und Schuld.

Komm, sag' es allen weiter,
ruf es in jedes Haus hinein!
Komm, sag es allen weiter:
Gott selber lädt uns ein.

Zu jedem will er kommen,
der Herr in Brot und Wein.
Und wer ihn aufgenommen,
wird selber Bote sein.

Komm, sag' es allen weiter,
ruf es in jedes Haus hinein!
Komm, sag es allen weiter:
Gott selber lädt uns ein.`,

    "Kommet ihr Hirten": `Kommet, ihr Hirten, ihr Männer und Fraun,
kommet, das liebliche Kindlein zu schaun,
Christus, der Herr, ist heute geboren,
den Gott zum Heiland euch hat erkoren.
Fürchtet euch nicht!

Lasset uns sehen in Bethlehems Stall,
was uns verheißen der himmlische Schall;
was wir dort finden, lasset uns künden,
lasset uns preisen in frommen Weisen.
Halleluja!

Wahrlich, die Engel verkündigen heut
Bethlehems Hirtenvolk gar große Freud:
Nun soll es werden Friede auf Erden,
den Menschen allen ein Wohlgefallen.
Ehre sei Gott!`,

    "Kommt atmet auf ihr sollt leben": `Kommt, atmet auf, ihr sollt leben.
Ihr müsst nicht mehr verzweifeln,
nicht länger mutlos sein.
Gott hat uns seinen Sohn gegeben.
Mit ihm kehrt neues Leben bei uns ein.

Ihr, die ihr seit langem nach dem Leben jagt,
und bisher vergeblich Antworten erfragt.
Hört die gute Nachricht,
dass euch Christus liebt,
dass er eurem Leben Sinn und Hoffnung gibt.

Ihr seid eingeladen. Gott liebt alle gleich.
Er trennt nicht nach Farben,
nicht nach arm und reich.
Er fragt nicht nach Rasse,
Herkunft und Geschlecht.
Jeder Mensch darf kommen,
Gott spricht ihn gerecht. 

Noch ist nichts verloren,
noch ist Rettung nah.
Noch ist Gottes Liebe für uns Menschen da. 
Noch wird Leben finden,
wer an Jesus glaubt.
Noch wird angenommen,
wer ihm fest vertraut.`,

    "Leben aus der Quelle": `Leben aus der Quelle, Leben nur aus dir,
Leben aus der Quelle des Lebens. (2x)

Und du erforscht mich, veränderst mein Denken,
nur noch aus dir will ich leben, oh Herr. (2x)

Leben aus der Quelle, Leben nur aus dir,

Hilfst mir zu schweigen und auf dich zu warten,
nur noch aus dir will ich leben, oh Herr. (2x)

Leben aus der Quelle, Leben nur aus dir,
Leben aus der Quelle des Lebens. (2x)

Willst mich gebrauchen, als Salz für die Erde,
nur noch aus dir will ich leben, oh Herr. (2x)

Leben aus der Quelle, Leben nur aus dir,
Leben aus der Quelle des Lebens. (2x)`,

    "Lege deine Sorgen nieder": `Lege deine Sorgen nieder
Leg sie ab in meiner Hand
Du brauchst mir nichts zu erklären
Denn ich hab dich längst erkannt

Lege sie nieder in meiner Hand.
Komm leg sie nieder, lass sie los in meiner Hand.

Frieden gebe ich dir wieder
Frieden hab ich dir gebracht

Du brauchst sie nicht länger tragen

Lege deine Zweifel nieder

Hoffnung gebe ich dir wieder
Lass die Zweifel einfach los`,

    "Leuchtend strahlt des Vaters Gnade": `Leuchtend strahlt des Vaters Gnade aus dem obern Heimatland,
doch uns hat er anvertrauet Rettungslichter längs dem Strand.

Lasst die Küstenfeuer brennen, lass sie leuchten weit hinaus,
denn sie zeigen manchen Schiffer sicherlich den Weg nach Haus.

Unser Weg war fern vom Lichte, unser Herz in Schuld und Qual,
doch aus Jesu Angesichte leuchtete der Liebe Strahl.

Lasst die Küstenfeuer brennen, lass sie leuchten weit hinaus,
denn sie zeigen manchen Schiffer sicherlich den Weg nach Haus.

Dunkel ist die Nacht der Sünde, schaurig klingt der Wogen Lied,
manches Auge sucht voll Sehnsucht, ob's am Strande Lichter sieht.

Lasst die Küstenfeuer brennen, lass sie leuchten weit hinaus,

Lass dein Licht doch nicht verlöschen, sonst vielleicht zu dieser Stund,

Lasst die Küstenfeuer brennen, lass sie leuchten weit hinaus,

    "Licht dieser WeltHere I am to worshipIch will dich anbeten": `Licht dieser Welt, du strahlst in unsrer Nacht auf,
leuchtest den Weg, lässt mich sehn.

    "Lobe den Herren den mächtigen König der Ehren": `Lobe den Herren, den mächtigen König der Ehren,
lob ihn, o Seele, vereint mit den himmlischen Chören.
Kommet zuhauf, Psalter und Harfe, wacht auf,
lasset den Lobgesang hören.

Lobe den Herren, der alles so herrlich regieret,
der dich auf Adelers Fittichen sicher geführet,
der dich erhält, wie es dir selber gefällt;
hast du nicht dieses verspüret?

Lobe den Herren, der künstlich und fein dich bereitet,
der dir Gesundheit verliehen, dich freundlich geleitet.
In wieviel Not hat nicht der gnädige Gott
über dir Flügel gebreitet!

Lobe den Herren, der sichtbar dein Leben gesegnet,
der aus dem Himmel mit Strömen der Liebe geregnet.

der dir mit Liebe begegnet!

Lobe den Herren, was in mir ist, lobe den Namen. 
Lob ihn mit allen, die seine Verheißung bekamen.
Er ist dein Licht, Seele, vergiss es ja nicht.

    "Lobe den Herrn meine Seele": `Lobe den Herrn, meine Seele, und seinen heiligen Namen.

Lobe, lobe den Herrn, loben den Herrn, meine Seele.
Lobe, lobe den Herrn, lobe den Herrn, meine Seele.

mit Psalmen und Weisen,

Lobe, lobe den Herrn, lobe den Herrn, meine Seele.

den will ich preisen

Lobe, lobe den Herrn, lobe den Herrn, meine Seele.`,

    "Macht hoch die Tür": `Macht hoch die Tür, die Tor macht weit;
Es kommt der Herr der Herrlichkeit,
Ein König aller Königreich,
Ein Heiland aller Welt zugleich,
Der Heil und Leben mit sich bringt;
Derhalben jauchzt, mit Freuden singt:
Gelobet sei mein Gott,
Mein Schöpfer reich von Rat.

Er ist gerecht, ein Helfer wert;
Sanftmütigkeit ist sein Gefährt,
Sein Königskron ist Heiligkeit,
Sein Zepter ist Barmherzigkeit;
All unsre Not zum End er bringt,
Derhalben jauchzt, mit Freuden singt:
Gelobet sei mein Gott,
Mein Heiland groß von Tat.

O wohl dem Land, o wohl der Stadt,
So diesen König bei sich hat.
Wohl allen Herzen insgemein,
Da dieser König ziehet ein.
Er ist die rechte Freudensonn,
Bringt mit sich lauter Freud und Wonn.
Gelobet sei mein Gott,
Mein Tröster früh und spat.

Macht hoch die Tür, die Tor macht weit,
Eu'r Herz zum Tempel zubereit'.
Die Zweiglein der Gottseligkeit
Steckt auf mit Andacht, Lust und Freud;
So kommt der König auch zu euch,
Ja, Heil und Leben mit zugleich.
Gelobet sei mein Gott,
Voll Rat, voll Tat, voll Gnad.

Komm, o mein Heiland Jesu Christ,
Meins Herzens Tür dir offen ist.
Ach zieh mit deiner Gnade ein;
Dein Freundlichkeit auch uns erschein.
Dein Heilger Geist uns führ und leit
Den Weg zur ewgen Seligkeit.
Dem Namen dein, o Herr,
Sei ewig Preis und Ehr.`,

    "MeerOceans (Where feet may fail)": `Du rufst mich raus auf's weite Wasser,

denn ich bin dein und du bist mein.

    "Mein Gott ist größer": `Egal wie hoch der Berg, egal wie stark der Feind

    "Nun danket alle Gott": `Nun danket alle Gott
mit Herzen, Mund und Händen,
der große Dinge tut
an uns und allen Enden,
der uns von Mutterleib
und Kindesbeinen an
unzählig viel zugut
bis hierher hat getan.

Der ewigreiche Gott
woll uns bei unserm Leben
ein immer fröhlich Herz
und seinen Frieden geben
und uns in seiner Gnad
erhalten fort und fort
und uns aus aller Not
erlösen hier und dort.

Lob, Ehr und Preis sei Gott
dem Vater und dem Sohne
und dem, der beiden gleich

ihm, dem dreieinen Gott,
wie es im Anfang war

    "Nur durch Christus in mir": `Das höchste Gut ist Jesus, mein Erlöser.
Es gibt nichts mehr, was Gott mir schenken kann,
er, meine Freud, Gerechtigkeit und Freiheit,
Liebe so treu, mein Frieden grenzenlos.
Ich bin gewiss: der Herr ist meine Hoffnung.
Fest verbunden bin ich nun mit ihm.
Ich bin sein, er ist mein, wir sind ewig vereint,
nicht durch mich, nur durch Christus in mir.

Die Nacht bricht an, doch ich bin nicht verlassen.
An meiner Seite ist und bleibt der Herr.
Ich schau auf ihn in Schwachheit und in Freude,
denn seine Kraft zeigt sich in meiner Not.
Ich bin gewiss: mein Hirte wird mich schützen,
durch das Tal des Todes führt er mich.
Ja, die Nacht ist besiegt und die Sorge verfliegt
nicht durch mich, nur durch Christus in mir.

Ich fürchte nichts. Ich weiß: mir ist vergeben,
die Zukunft fest, das Lösegeld bezahlt.
Durch Jesu Blut und Leid bin ich begnadigt,
der Tod besiegt, weil Jesus auferstand.
Ich bin gewiss: besiegt bleibt meine Sünde,
denn mein Herr steht ewig für mich ein.
Von den Ketten befreit, sing ich jetzt: „Ich bin sein!“,
nicht durch mich, nur durch Christus in mir.

Nun folg ich ihm im Leben und im Sterben,
denn er versprach, dass er nach Haus mich führt.
Ja, Tag für Tag wird Jesus mich erneuern,
bis ich voll Freude steh vor seinem Thron.
Ich bin gewiss: der Herr ist meine Hoffnung.
Aller Dank und Ehre sei nur ihm!
Ist mein Lauf dann vollbracht,
bleibt mein Lied immer noch:
„Nicht durch mich, nur durch Christus in mir“.`,

    "O Haupt voll Blut und Wunden": `O Haupt voll Blut und Wunden,
voll Schmerz und voller Hohn,
o Haupt, zum Spott gebunden
mit einer Dornenkron, o Haupt,

mit höchster Ehr und Zier,
jetzt aber hoch schimpfieret:
gegrüßet seist du mir!

Du edles Angesichte,
davor sonst schrickt
und scheut das große Weltgewichte:
wie bist du so bespeit,
wie bist du so erbleichet!
Wer hat dein Augenlicht,
dem sonst kein Licht nicht gleichet,
so schändlich zugericht'?

Nun, was du, Herr, erduldet,
ist alles meine Last;
ich hab es selbst verschuldet,
was du getragen hast.
Schau her, hier steh ich Armer,
der Zorn verdienet hat.
Gib mir, o mein Erbarmer,
den Anblick deiner Gnad.

Erkenne mich, mein Hüter,
mein Hirte, nimm mich an.
Von dir, Quell aller Güter,
ist mir viel Guts getan;
dein Mund hat mich gelabet
mit Milch und süßer Kost,
dein Geist hat mich begabet
mit mancher Himmelslust.

Ich will hier bei dir stehen,
verachte mich doch nicht;
von dir will ich nicht gehen,
wenn dir dein Herze bricht;
wenn dein Haupt wird erblassen
im letzten Todesstoß,
alsdann will ich dich fassen
in meinem Arm und Schoß.

Es dient zu meinen Freuden
und tut mir herzlich wohl,
wenn ich in deinem Leiden,
mein Heil, mich finden soll.
Ach möcht ich, o mein Leben,
an deinem Kreuze hier
mein Leben von mir geben,
wie wohl geschähe mir!

Ich danke dir von Herzen,
o Jesu, liebster Freund,
für deines Todes Schmerzen,
da du´s so gut gemeint.
Ach gib, dass ich mich halte
zu dir und deiner Treu
und, wenn ich einst erkalte,
in dir mein Ende sei.

Wenn ich einmal soll scheiden,
so scheide nicht von mir,
wenn ich den Tod soll leiden,
so tritt du dann herfür;
wenn mir am allerbängsten
wird um das Herze sein,
so reiß mich aus den Ängsten
kraft deiner Angst und Pein.

Erscheine mir zum Schilde,
zum Trost in meinem Tod,
und lass mich sehn dein Bilde
in deiner Kreuzesnot.
Da will ich nach dir blicken,
da will ich glaubensvoll
dich fest an mein Herz drücken.
Wer so stirbt, der stirbt wohl.

Die Farbe deiner Wangen,
der roten Lippen Pracht
ist hin und ganz vergangen,
des blassen Todes Macht,
hat alles hingenommen,
hat alles hingerafft,
und daher bist du kommen
von deines Leibes Kraft.`,

    "O komm du Geist der Wahrheit": `O komm, du Geist der Wahrheit,
und kehre bei uns ein,
verbreite Licht und Klarheit,
verbanne Trug und Schein.
Gieß aus dein heilig Feuer,
rühr Herz und Lippen an,
dass jeglicher getreuer

O du, den unser größter
Regent uns zugesagt:
komm zu uns, werter Tröster,
und mach uns unverzagt.
Gib uns in dieser schlaffen
und glaubensarmen Zeit
die scharf geschliffnen Waffen
der ersten Christenheit.

Unglaub und Torheit brüsten
sich frecher jetzt als je;

mit Waffen aus der Höh.
Du musst uns Kraft verleihen,
Geduld und Glaubenstreu
und musst uns ganz befreien

Es gilt ein frei Geständnis

ein offenes Bekenntnis
bei allem Widerstreit,
trotz aller Feinde Toben,
trotz allem Heidentum
zu preisen und zu loben
das Evangelium.

In aller Heiden Lande
erschallt dein kräftig Wort,
sie werfen Satans Bande
und ihre Götzen fort;
von allen Seiten kommen
sie in das Reich herein;
ach soll es uns genommen,

O wahrlich, wir verdienen
solch strenges Strafgericht;
uns ist das Licht erschienen,

Ach lasset uns gebeugter

des Wortes lasse stehn.

Du Heilger Geist, bereite
ein Pfingstfest nah und fern;
mit deiner Kraft begleite
das Zeugnis von dem Herrn.
O öffne du die Herzen
der Welt und uns den Mund,
dass wir in Freud und Schmerzen
das Heil ihr machen kund.`,

    "Wer nur den lieben Gott lässt walten": `Wer nur den lieben Gott lässt walten

Was helfen uns die schweren Sorgen,

Man halte nur ein wenig stille

Er kennt die rechten Freudenstunden,

Denk nicht in deiner Drangsalshitze,

und dass ihm der im Schoße sitze,

Die Folgezeit verändert viel

Es sind ja Gott sehr leichte Sachen
und ist dem Höchsten alles gleich:
Den Reichen klein und arm zu machen,

Gott ist der rechte Wundermann,

Sing, bet und geh auf Gottes Wegen,

so wird er bei dir werden neu.
Denn welcher seine Zuversicht

    "Wie soll ich dich empfangen": `Wie soll ich dich empfangen und wie begegn ich dir,
o aller Welt Verlangen, o meiner Seelen Zier?
O Jesu, Jesu, setze mir selbst die Fackel bei,
damit, was dich ergötze, mir kund und wissend sei.

Dein Zion streut dir Palmen und grüne Zweige hin,
und ich will dir in Psalmen ermuntern meinen Sinn.
Mein Herze soll dir grünen in stetem Lob und Preis
und deinem Namen dienen, so gut es kann und weiß.

Was hast du unterlassen zu meinem Trost und Freud,
als Leib und Seele saßen in ihrem größten Leid?
Als mir das Reich genommen, da Fried und Freude lacht,
da bist du, mein Heil, kommen und hast mich froh gemacht.

Ich lag in schweren Banden, du kommst und machst mich los;
ich stand in Spott und Schanden, du kommst und machst mich groß
und hebst mich hoch zu Ehren und schenkst mir großes Gut,
das sich nicht läßt verzehren, wie irdisch Reichtum tut.

Nichts, nichts hat dich getrieben zu mir vom Himmelszelt
als das geliebte Lieben, damit du alle Welt
in ihren tausend Plagen und großen Jammerlast,
die kein Mund kann aussagen, so fest umfangen hast.

Das schreib dir in dein Herze, du hochbetrübtes Heer,
bei denen Gram und Schmerze sich häuft je mehr und mehr;
seid unverzagt, ihr habet die Hilfe vor der Tür;
der eure Herzen labet und tröstet, steht allhier.

Ihr dürft euch nicht bemühen noch sorgen Tag und Nacht,
wie ihr ihn wollet ziehen mit eures Armes Macht.
Er kommt, er kommt mit Willen, ist voller Lieb und Lust,
all Angst und Not zu stillen, die ihm an euch bewußt.

Auch dürft ihr nicht erschrecken vor eurer Sünden Schuld;
nein, Jesus will sie decken mit seiner Lieb und Huld.
Er kommt, er kommt den Sündern zu Trost und wahrem Heil,
schafft, daß bei Gottes Kindern verbleib ihr Erb und Teil.

Was fragt ihr nach dem Schreien der Feind und ihrer Tück?
Der Herr wird sie zerstreuen in einem Augenblick.
Er kommt, er kommt, ein König, dem wahrlich alle Feind
auf Erden viel zu wenig zum Widerstande seind.

Er kommt zum Weltgerichte: zum Fluch dem, der ihm flucht,
mit Gnad und süßem Lichte dem, der ihn liebt und sucht.

zum ewgen Licht und Wonne in deinen Freudensaal.`,

  // ---------- Globale Variablen ----------
  let currentStrophen = [];          // Array mit den einzelnen Strophen des geladenen Liedes
  let currentIndex = 0;              // Aktuelle Strophen-Nummer (0‑basiert)
  let currentSongName = '';          // Name des gerade geladenen Liedes (für Anzeige)

  // DOM-Elemente
  const songListEl = document.getElementById('songList');
  const textDisplayEl = document.getElementById('textDisplay');
  const presentBtn = document.getElementById('presentBtn');
  const modal = document.getElementById('presentationModal');
  const stropheTextEl = document.getElementById('stropheText');
  const prevBtn = document.getElementById('prevStropheBtn');
  const nextBtn = document.getElementById('nextStropheBtn');
  const closeBtn = document.getElementById('closePresentationBtn'); // neu

  // ---------- Hilfsfunktion: Strophen aus Text extrahieren (durch Leerzeilen getrennt) ----------
  function extractStrophen(text) {
    return text.split(/\n\s*\n/).filter(strophe => strophe.trim() !== '');
  }

  // ---------- Lied laden (wird beim Klick auf Liste aufgerufen) ----------
  function loadSong(songName) {
    const text = songs[songName];
    if (!text) return;

    currentStrophen = extractStrophen(text);
    currentIndex = 0;
    currentSongName = songName;

    // Gesamten Text im normalen Display anzeigen
    textDisplayEl.textContent = text;

    // Markierung des ausgewählten Liedes in der Liste
    const items = document.querySelectorAll('#songList li');
    items.forEach(li => {
      if (li.dataset.name === songName) {
        li.classList.add('selected');
      } else {
        li.classList.remove('selected');
      }
    });
  }

  // ---------- Präsentationsmodus: Strophe aktualisieren ----------
  function updateStrophe() {
    if (currentStrophen.length > 0 && currentIndex >= 0 && currentIndex < currentStrophen.length) {
      stropheTextEl.textContent = currentStrophen[currentIndex];
    } else {
      stropheTextEl.textContent = '❌ Keine Strophe verfügbar';
    }
  }

  function nextStrophe() {
    if (currentStrophen.length === 0) return;
    if (currentIndex < currentStrophen.length - 1) {
      currentIndex++;
      updateStrophe();
    }
  }

  function prevStrophe() {
    if (currentStrophen.length === 0) return;
    if (currentIndex > 0) {
      currentIndex--;
      updateStrophe();
    }
  }

  // ---------- Präsentationsmodus öffnen / schließen ----------
  function showPresentation() {
    if (currentStrophen.length === 0) {
      alert('Bitte zuerst ein Lied auswählen.');
      return;
    }
    modal.style.display = 'flex';
    updateStrophe();
  }

  function hidePresentation() {
    modal.style.display = 'none';
  }

  // ---------- Event-Listener für die Liederliste (Delegation) ----------
  function buildSongList() {
    const ul = document.getElementById('songList');
    ul.innerHTML = '';
    // Sortierte Liste der Liednamen (alphabetisch)
    const sortedNames = Object.keys(songs).sort((a,b) => a.localeCompare(b));
    sortedNames.forEach(name => {
      const li = document.createElement('li');
      li.textContent = name;  // Anzeige ohne .txt (sauberer)
      li.dataset.name = name;
      li.addEventListener('click', () => {
        loadSong(name);
      });
      ul.appendChild(li);
    });
  }

  // ---------- Tastatursteuerung für Präsentationsmodus ----------
  document.addEventListener('keydown', (e) => {
    if (modal.style.display !== 'flex') return;  // nur wenn Modal sichtbar

    if (e.key === 'Escape') {
      hidePresentation();
    } else if (e.key === 'ArrowRight') {
      nextStrophe();
      e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
      prevStrophe();
      e.preventDefault();
    }
  });

  // ---------- Maussteuerung für Präsentationsmodus (Klick = weiter, Rechtsklick = zurück) ----------
  modal.addEventListener('click', (e) => {
    // Klick auf die Buttons soll nicht den Modal-Klick auslösen
    if (e.target.closest('button')) return;
    nextStrophe();
  });

  modal.addEventListener('contextmenu', (e) => {
    e.preventDefault();  // Kontextmenü unterdrücken
    if (e.target.closest('button')) return;
    prevStrophe();
  });

  // Buttons im Präsentationsmodus
  nextBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    nextStrophe();
  });
  prevBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    prevStrophe();
  });
  // Neuer Schließen-Button
  closeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    hidePresentation();
  });

  // Präsentationsmodus öffnen
  presentBtn.addEventListener('click', showPresentation);

  // ---------- Initialisierung: Liederliste erstellen ----------
  buildSongList();

})();
</script>
